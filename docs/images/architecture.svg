<svg width="800" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: transparent;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { fill: #c2c0b6; }
text.th { font-size: 14px; font-weight: 500; }
text.ts { font-size: 12px; font-weight: 400; fill: #9c9a92; }
.leader { stroke: #9c9a92; stroke-width: 0.5; stroke-dasharray: 3 3; }
.blue-fill { fill: #0C447C; stroke: #85B7EB; }
.blue-th { fill: #B5D4F4; }
.blue-ts { fill: #85B7EB; }
.teal-fill { fill: #085041; stroke: #5DCAA5; }
.teal-th { fill: #9FE1CB; }
.teal-ts { fill: #5DCAA5; }
.purple-fill { fill: #3C3489; stroke: #AFA9EC; }
.purple-th { fill: #CECBF6; }
.purple-ts { fill: #AFA9EC; }
.gray-fill { fill: #444441; stroke: #B4B2A9; }
.gray-th { fill: #D3D1C7; }
.gray-ts { fill: #B4B2A9; }
</style>
</defs>

<!-- Browser boundary -->
<rect x="40" y="20" width="600" height="216" rx="16" fill="none" stroke="#9c9a92" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="42" text-anchor="middle" opacity="0.7">Browser</text>

<!-- Chat panel -->
<rect class="blue-fill" x="58" y="56" width="244" height="162" rx="10" stroke-width="0.5"/>
<text class="th blue-th" x="180" y="88" text-anchor="middle" dominant-baseline="central">Chat panel</text>
<text class="ts blue-ts" x="180" y="110" text-anchor="middle" dominant-baseline="central">User requests + AI responses</text>

<!-- Canvas -->
<rect class="teal-fill" x="338" y="56" width="284" height="162" rx="10" stroke-width="0.5"/>
<text class="th teal-th" x="480" y="82" text-anchor="middle" dominant-baseline="central">Canvas</text>

<!-- Widgets -->
<rect class="purple-fill" x="356" y="102" width="74" height="38" rx="6" stroke-width="0.5"/>
<text class="ts purple-ts" x="393" y="117" text-anchor="middle" dominant-baseline="central">Widget</text>
<text class="ts purple-ts" x="393" y="132" text-anchor="middle" dominant-baseline="central" opacity="0.65">(React)</text>

<rect class="purple-fill" x="443" y="102" width="74" height="38" rx="6" stroke-width="0.5"/>
<text class="ts purple-ts" x="480" y="117" text-anchor="middle" dominant-baseline="central">Widget</text>
<text class="ts purple-ts" x="480" y="132" text-anchor="middle" dominant-baseline="central" opacity="0.65">(React)</text>

<rect class="purple-fill" x="530" y="102" width="74" height="38" rx="6" stroke-width="0.5"/>
<text class="ts purple-ts" x="567" y="117" text-anchor="middle" dominant-baseline="central">Widget</text>
<text class="ts purple-ts" x="567" y="132" text-anchor="middle" dominant-baseline="central" opacity="0.65">(React)</text>

<text class="ts" x="480" y="164" text-anchor="middle" opacity="0.5">draggable</text>

<!-- Cloud — Anthropic boundary -->
<rect x="120" y="272" width="440" height="82" rx="16" fill="none" stroke="#9c9a92" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="292" text-anchor="middle" opacity="0.7">Cloud — Anthropic</text>

<!-- Claude API -->
<rect class="blue-fill" x="170" y="300" width="340" height="44" rx="10" stroke-width="0.5"/>
<text class="th blue-th" x="340" y="322" text-anchor="middle" dominant-baseline="central">Claude API + MCP tools</text>

<!-- Awareness -->
<rect class="purple-fill" x="100" y="410" width="236" height="50" rx="10" stroke-width="0.5"/>
<text class="th purple-th" x="218" y="435" text-anchor="middle" dominant-baseline="central">Awareness (MCP server)</text>

<!-- PostgreSQL -->
<rect class="gray-fill" x="416" y="410" width="164" height="50" rx="10" stroke-width="0.5"/>
<text class="th gray-th" x="498" y="435" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>

<!-- Arrow: Chat Panel → Claude API (natural language) -->
<line x1="200" y1="218" x2="200" y2="298" stroke="#85B7EB" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="140" y="262" text-anchor="middle">natural language</text>

<!-- Arrow: Claude API → Chat Panel (JSX + data) -->
<line x1="280" y1="300" x2="280" y2="220" stroke="#85B7EB" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="330" y="262" text-anchor="middle">JSX + data</text>

<!-- Arrow: Chat Panel → Canvas (inject widget) -->
<line x1="302" y1="137" x2="336" y2="137" stroke="#5DCAA5" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="319" y="187" text-anchor="middle">inject widget</text>
<line class="leader" x1="319" y1="181" x2="319" y2="145"/>

<!-- Arrow: Widgets ↔ Claude API (refresh queries) -->
<line x1="474" y1="218" x2="434" y2="298" stroke="#AFA9EC" stroke-width="1.2" fill="none" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text class="ts" x="478" y="260" text-anchor="start">refresh queries</text>

<!-- Arrow: Claude API ↔ Awareness (MCP tool calls) -->
<line x1="278" y1="344" x2="234" y2="408" stroke="#AFA9EC" stroke-width="1.2" fill="none" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text class="ts" x="236" y="382" text-anchor="start">MCP tool calls</text>

<!-- Arrow: Awareness ↔ PostgreSQL -->
<line x1="336" y1="435" x2="414" y2="435" stroke="#B4B2A9" stroke-width="1.2" fill="none" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

</svg>
